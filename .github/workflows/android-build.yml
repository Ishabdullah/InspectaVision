name: Android Build

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'apps/android/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  ANDROID_VERSION: '35'
  BUILD_TOOLS_VERSION: '34.0.0'
  NDK_VERSION: '26.1.10909125'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Enable KVM group perms (for emulator if needed)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: |
          sdkmanager --licenses <<< y
          sdkmanager "platform-tools" \
            "platforms;android-${{ env.ANDROID_VERSION }}" \
            "build-tools;${{ env.BUILD_TOOLS_VERSION }}" \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;3.22.1"

      - name: Clone llama.cpp
        working-directory: apps/android/app/src/main/cpp
        run: |
          if [ ! -d "llama.cpp" ]; then
            git clone --depth 1 --branch b4426 https://github.com/ggerganov/llama.cpp.git
          else
            echo "llama.cpp already exists"
          fi

      - name: Set up Gradle
        working-directory: apps/android
        run: |
          chmod +x gradlew
          ./gradlew --version

      - name: Create local.properties
        working-directory: apps/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> local.properties
          echo "cmake.dir=$ANDROID_HOME/cmake/3.22.1" >> local.properties
          cat local.properties

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: apps/android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "APK_FILE=apps/android/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_ENV

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: apps/android
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE" ]; then
            echo "$RELEASE_KEYSTORE" | base64 -d > keystore.jks
            ./gradlew assembleRelease \
              --no-daemon --stacktrace \
              -Pandroid.injected.signing.store.file=../keystore.jks \
              -Pandroid.injected.signing.store.password=$RELEASE_KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$RELEASE_KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$RELEASE_KEY_PASSWORD
            echo "APK_FILE=apps/android/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_ENV
          else
            echo "No signing config found, building unsigned release APK"
            ./gradlew assembleRelease --no-daemon --stacktrace
            echo "APK_FILE=apps/android/app/build/outputs/apk/release/app-release-unsigned.apk" >> $GITHUB_ENV
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: inspectavision-apk-${{ github.event.inputs.build_type || 'debug' }}
          path: ${{ env.APK_FILE }}
          retention-days: 30

      - name: Generate Build Info
        id: build_info
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Create Build Summary
        run: |
          echo "## 📱 InspectaVision Android Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Time:** ${{ steps.build_info.outputs.build_time }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type:** ${{ github.event.inputs.build_type || 'debug' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APK Details" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ env.APK_FILE }}" ]; then
            echo "- **Size:** $(du -h ${{ env.APK_FILE }} | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "- **Path:** \`${{ env.APK_FILE }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **SHA256:** $(sha256sum ${{ env.APK_FILE }} | cut -d' ' -f1)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:** Build completed, APK not found" >> $GITHUB_STEP_SUMMARY
          fi

  create_release:
    name: Create GitHub Release
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: inspectavision-apk-release
          path: ./apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./apk/*.apk
          generate_release_notes: true
          make_latest: true
